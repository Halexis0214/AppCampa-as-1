<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Campañas Impactar</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="catalog-view">
        <div class="header">
            <img src="logo-impactar1.png" alt="Logo Impactar" class="main-logo">

            <h1>Catálogo de Campañas</h1>
            <p>Selecciona una campaña para personalizarla con tu logo.</p>
        </div>

        <div style="text-align: right; margin-bottom: 20px;">
            <button id="viewCartBtn" class="btn-action" style="background-color: #28a745; display: none;">
                🛒 Ver Carrito (<span id="cartCount">0</span>)
            </button>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="🔍 Buscar por título o categoría (ej. mascota, ruido)...">
        </div>

        <div class="promo-banner">
            🔥 <strong>¡Aprovecha!</strong> Lleva 3 o más campañas y obtén un <strong>20% de descuento</strong> en toda tu compra.
        </div>

        <div class="filters" id="filtersContainer">
            </div>

        <div class="gallery" id="galleryContainer">
            </div>
    </div>

    <div id="editor-view">
        <div class="toolbar">
            <button id="backBtn" class="btn-action btn-secondary">⬅ Volver al Catálogo</button>
            
            <div style="display: flex; gap: 10px;">
                <label for="logoUpload" class="btn-action">1. 📁 Subir Logo Cliente</label>
                <input type="file" id="logoUpload" accept="image/png, image/jpeg">
                
                <button id="addToCartBtn" class="btn-action" style="background-color: #28a745;">🛒 Añadir al Carrito</button>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="canvasEditor"></canvas>
        </div>
    </div>


<div id="cart-view" style="display: none; width: 100%; max-width: 800px; margin: 0 auto; padding-top: 20px;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <button id="backFromCartBtn" class="btn-action" style="background-color: #6c757d; margin: 0;">⬅ Seguir Comprando</button>
            <h2 style="margin: 0; flex-grow: 1; text-align: center;">🛒 Tu Pedido</h2>
            <div style="width: 170px;"></div> </div>

        <div id="dynamicPromoMessage"></div>
        
        <div id="cartItemsContainer" style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px;">
            </div>

        <div id="cartSummary" style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: right;">
            <h3 style="margin-bottom: 10px; color: #555;">Subtotal: <span id="subtotalPrice" style="color: #000;">$0</span></h3>
            <h3 style="margin-bottom: 10px; color: #d9534f;">Descuento: <span id="discountPrice">$0</span></h3>
            <h2 style="margin-top: 15px; font-size: 24px;">Total a Pagar: <span id="totalPrice" style="color: #198754;">$0</span></h2>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            
            <button id="checkoutBtn" class="btn-action" style="background-color: #0d6efd; font-size: 18px; padding: 15px 30px; width: 100%; max-width: 400px; margin: 0 auto; display: block;">
                Pagar y Descargar 🚀
            </button>
        </div>
    </div>



    <script src="script.js"></script>
</body>
</html>
